project:
  type: website
  output-dir: website
  preview:
    port: 1111
    browser: true
    watch-inputs: true
  render:
    - index.qmd
    - demo.qmd
  resources:
    - src/
website:
  title: "ISOTYPIFY"
  favicon: img/favicon.ico
  navbar:
    left:
      - href: index.qmd
        text: Editor
      - href: demo.qmd
        text: Demo
    right:
      - icon: github
        href: https://github.com/schmoigl/isotypify
        aria-label: GitHub
  search: false
format:
  html:
    theme: [style/style.scss]
    grid:
      body-width: 1200px
      margin-width: 380px
      gutter-width: 12px
    toc: false
    page-layout: article
    fontsize: 18px
    anchor-sections: false